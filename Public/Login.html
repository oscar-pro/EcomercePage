<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Ecomerce Page</title>
    <link rel="stylesheet" href="Login.css">
</head>

<body>
    <!-- ButtonReverse -->
    <div class="Regresar">
        <button id="Reverse"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3" />
            </svg>
        </button>
    </div>
    <!-- Login  -->
    <div id="login-container">
        <div class="login-card">
            <h2>Iniciar Sesión</h2>

            <form>
                <div class="input-group">
                    <label>Correo</label>
                    <input type="email" placeholder="ejemplo@gmail.com">
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="********">
                </div>

                <button type="submit">Entrar</button>
            </form>

            <div class="Component_LineLogin">
                <div class="Line"></div>
                <strong>o</strong>
                <div class="Line"></div>
            </div>
            <p class="olvideMiContrasenia">
                Olvide mi contraseña
            </p>
            <p class="extra">
                ¿No tienes cuenta? <a id="eXtra">Regístrate</a>
            </p>
        </div>
    </div>
    <!-- Registro -->
    <div id="Registro-container">
        <div class="Registro-card">
            <h2>Registrese Aqui</h2>

            <form>
                <div class="input-group">
                    <label>Nombre Completo</label>
                    <input type="text" placeholder="ejemplo">
                </div>

                <div class="input-group">
                    <label>Correo</label>
                    <input type="email" placeholder="ejemplo@gmail.com">
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="********">
                </div>

                <button type="submit">Entrar</button>


                <div class="Component_LineLogin">
                    <div class="Line"></div>
                    <strong>o</strong>
                    <div class="Line"></div>
                </div>
            </form>
        </div>
    </div>
</body>
<script src="./Javascript/main.js"></script>
<script src="./Javascript/Login.js"></script>

</html>
