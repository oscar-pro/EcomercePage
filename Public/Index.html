<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecomerse Coste</title>
    <link rel="stylesheet" href="Css/Styles.css">
</head>

<body>

    <!-- ------------------------------------------------------
    Header de la pagina Ecomerce 
    -------------------------------------------------------->
    <header>

        <!-- menu header -->
        <div class="Divition_ProfileMenu">
            <div class="Profile_User">
                <!-- Logo Usuario -->
                <div id="ProfileUser">
                    <svg id="svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                    </svg>
                    <!-- Username -->
                    <span id="UserName"><span id="User@">@</span>user</span>
                </div>



            </div>
        </div>

        <!-- Search -->
        <div class="Divition_Header_Search">
            <input type="search" id="Search_Products" placeholder="Buscar...">
            <aside id="AsideBtn">
                <input type="button" value="Buscar" id="BuscarBtn">
            </aside>
        </div>

        <!-- Login / Register -->
        <div class="Divition_Header_RegisterUser">
            <div class="UserLogin">

                <div id="Login">
                    <svg id="svglogin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                    <strong id="Enlace_InicioSecion_User">
                        <a>Acceder</a>
                    </strong>
                </div>

            </div>
        </div>

    </header>

    <!-- NAV -->
    <nav>
        <div class="Ecomerce_NavNameAndListas">

            <div class="LogoEcomerce">
                <div id="LogoImg"></div>
                <aside class="NameEcomerce">
                    <strong id="Ecomerce">Ecomerce</strong>
                </aside>
            </div>

            <div c lass="Listas_NavEcomerce">
                <ul id="Listas_Ul"></ul>
            </div>

        </div>
    </nav>

    <!-- MAIN -->
    <main>
        <div class="ecommerce">

            <!-- TOP PRODUCTOS -->
            <section class="top-products">
                <h2 class="section-title">Top 10 Productos</h2>

                <div class="carousel">

                    <button class="nav left">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
                        </svg>
                    </button>

                    <!-- 👇 CONTENEDOR LIMPIO -->
                    <div class="carousel-track loading">

                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>

                    </div>

                    <button class="nav right">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
                        </svg>
                    </button>

                </div>
            </section>

            <!-- MÁS PRODUCTOS -->
            <section class="more-products">
                <h2 class="section-title">Más Productos</h2>

                <div class="carousel">

                    <button class="nav left">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
                        </svg>
                    </button>

                    <!-- 👇 CONTENEDOR LIMPIO -->
                    <div class="carousel-track loading">

                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>

                    </div>

                    <button class="nav right">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
                        </svg>
                    </button>

                </div>
            </section>

        </div>
    </main>

    <!-- FOOTER -->
    <footer>

        <section class="footer_threeDivs">

            <!-- Contacto -->
            <div id="Contact">
                <div class="TelefonoContact">
                    <strong>Telefono</strong>
                    <aside>
                        <p><span>+57 </span>3215776202</p>
                    </aside>
                </div>

                <div id="EmailContact">
                    <strong>Correo</strong>
                    <aside>
                        <p>oscaralfaro@gmail.com</p>
                    </aside>
                </div>

                <aside>
                    <input type="submit" value="Ir" id="Ir_Contacto">
                </aside>
            </div>

            <!-- Horario -->
            <div id="Horario">
                <div class="Horario-Atention">
                    <p>Horario De Atención</p>
                    <p>Lunes - Viernes</p>
                    <p>7:00 am - 4:00 pm</p>
                </div>
            </div>

            <!-- Redes -->
            <div id="SotialityRed">
                <div id="SotialR    ed">

                    <div id="FacebookCaja">
                        <img src="" id="Logo_Facebook" alt="https://facebook.com">
                        <p>Facebook</p>
                    </div>

                    <div id="InstaCaja">
                        <img src="" id="Logo_Insta" alt="Ir a Instagram">
                        <p>Instagram</p>
                    </div>

                    <div id="GitCaja">
                        <img src="#" id="Logo_Git" alt="Ir a GitHub">
                        <p>GitHub</p>
                    </div>

                </div>
            </div>

        </section>
        <hr>
        <aside id="AutorCredits"> ©2026 Ecommerce. Todos los Derechos Reservados</aside>

    </footer>

    <!-- Scripts -->
    <script src="Javascript/main.js"></script>
</body>

</html>
